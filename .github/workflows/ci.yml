name: CI

# Runs on every PR targeting main (required status check for branch protection)
# Also runs on direct pushes to develop so contributors get feedback on their branch
on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:run

      - name: Build library
        run: npm run build
